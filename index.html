<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#3b82f6">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="korean-flag.jpg">
    <title>K-Miner</title>
    <script src="https://cdn.tailwindcss.com?v=3.4.1"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        .loading-spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col font-sans text-slate-900">

<header class="bg-white border-b sticky top-0 z-50 p-4 flex justify-between items-center shadow-sm">
        <h1 class="text-xl font-black text-blue-600 tracking-tighter">K-Mine</h1>
        <button onclick="toggleSettings()" class="text-slate-400 p-2"><i class="fas fa-cog"></i></button>
    </header>

    <main class="flex-grow p-4 max-w-lg mx-auto w-full space-y-4">
        <div class="bg-white p-5 rounded-3xl shadow-sm border border-slate-100">
            <textarea id="sentenceInput" class="w-full p-4 bg-slate-50 border-none rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none text-lg" rows="3" placeholder="Paste Korean sentence here..."></textarea>
            <button id="mineBtn" onclick="mineSentence()" class="w-full mt-4 bg-blue-600 text-white font-bold py-4 rounded-2xl flex justify-center items-center shadow-lg shadow-blue-100 active:scale-95 transition">
                <span id="btnText">Analyze</span>
                <div id="btnSpinner" class="loading-spinner ml-3 hidden"></div>
            </button>
        </div>

<div id="resultCard" class="bg-white p-4 rounded-3xl shadow-sm border border-slate-100 hidden relative z-10">
            <div id="analysisContent" class="space-y-4 text-sm"></div>
            <div class="mt-6 flex gap-3 relative z-20">
                <button id="retryAnkiBtn" onclick="addToAnki()" class="flex-grow bg-emerald-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-emerald-50 relative z-30">Add to Anki</button>
                <button onclick="clearResult()" class="px-5 bg-slate-50 rounded-2xl text-slate-300"><i class="fas fa-trash"></i></button>
            </div>
        </div>
    </main>

    <!-- Settings Overlay -->
    <div id="settingsOverlay" class="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-20 flex items-center justify-center p-6 hidden">
        <div class="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl">
            <h2 class="text-2xl font-black mb-6 text-center">Settings</h2>
            <div class="space-y-5">
<div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2 tracking-widest">Gemini API Key</label>
                    <input type="password" id="apiKeyInput" class="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 shadow-inner" placeholder="Paste key here">
                    <p class="text-[10px] text-slate-300 mt-2">🔒 Stored locally in your browser. Clear browser data to reset.</p>
                </div>
<div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2 tracking-widest">Gemini Model</label>
                    <input type="text" id="modelInput" value="gemini-3-flash-preview" class="w-full p-4 bg-slate-50 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 shadow-inner" placeholder="gemini-3-flash-preview">
                </div>
                <button onclick="saveSettings()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl mt-4">Save Configuration</button>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white font-bold text-sm shadow-2xl transition-all opacity-0 z-30 scale-90 text-center min-w-[200px] pointer-events-none"></div>

<script>
        let currentAnalysis = null;

function extractJsonFromText(text) {
            try {
                const match = text.match(/\{[\s\S]*\}/);
                if (match) return JSON.parse(match[0]);
            } catch (e) {}
            return null;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
window.onload = () => {
            document.getElementById('apiKeyInput').value = localStorage.getItem('gemini_api_key') || '';
            document.getElementById('modelInput').value = localStorage.getItem('gemini_model') || 'gemini-3-flash-preview';
        };

        function toggleSettings() { document.getElementById('settingsOverlay').classList.toggle('hidden'); }
        function saveSettings() {
            localStorage.setItem('gemini_api_key', document.getElementById('apiKeyInput').value);
            localStorage.setItem('gemini_model', document.getElementById('modelInput').value);
            showToast('Settings Saved', 'bg-slate-900'); toggleSettings();
        }

        function showToast(msg, color) {
            const t = document.getElementById('toast'); t.innerText = msg;
            t.className = `fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white font-bold text-sm shadow-2xl transition-all z-30 scale-100 pointer-events-none ${color}`;
            t.style.opacity = '1'; 
            t.classList.remove('pointer-events-none');
            setTimeout(() => { 
                t.style.opacity = '0'; 
                t.classList.add('scale-90');
            }, 1500);
            setTimeout(() => t.classList.add('pointer-events-none'), 1800);
        }

function validateAnalysis(data) {
            if (!data) return { valid: false, error: 'Empty response from API' };
            if (typeof data.sentence !== 'string') return { valid: false, error: 'Invalid response: missing sentence' };
            if (typeof data.translation !== 'string') return { valid: false, error: 'Invalid response: missing translation' };
            if (!Array.isArray(data.breakdown)) return { valid: false, error: 'Invalid response: breakdown must be an array' };
            for (const item of data.breakdown) {
                if (typeof item.word !== 'string' || typeof item.meaning !== 'string') {
                    return { valid: false, error: 'Invalid response: breakdown items must have word and meaning' };
                }
            }
            if (data.grammar !== undefined && !Array.isArray(data.grammar)) {
                return { valid: false, error: 'Invalid response: grammar must be an array' };
            }
            return { valid: true };
        }

        async function mineSentence() {
            const sentence = document.getElementById('sentenceInput').value.trim();
            const apiKey = localStorage.getItem('gemini_api_key');
            if (!sentence) return showToast('Error: Please enter a sentence', 'bg-rose-500');
            if (!apiKey) { toggleSettings(); return showToast('Error: Missing API Key in Settings', 'bg-rose-500'); }

            const btn = document.getElementById('mineBtn'), spinner = document.getElementById('btnSpinner'), text = document.getElementById('btnText');
            btn.disabled = true; text.classList.add('hidden'); spinner.classList.remove('hidden');

            const prompt = `Analyze Korean sentence ${JSON.stringify(sentence)} and return JSON with keys: sentence, translation, breakdown (array with word/meaning/note), grammar (array with point/explanation), slang_or_culture. Example: {"sentence":"안녕","translation":"hello","breakdown":[{"word":"안녕","meaning":"hello","note":""}],"grammar":[],"slang_or_culture":""}`;

try {
                let data;
                const model = localStorage.getItem('gemini_model') || 'gemini-3-flash-preview';
                try {
const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
                        body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                    });
                    const responseText = await res.text();
                    if (!res.ok) {
                        console.error('API Error Response:', responseText);
                        throw new Error(`Status ${res.status}: ${responseText}`);
                    }
                    data = JSON.parse(responseText);
                } catch (apiErr) {
                    throw new Error(`Gemini API Failed: ${apiErr.message}`);
                }

                console.log('API Response:', data);
                const analysisText = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (!analysisText) throw new Error("Gemini returned an empty response");

                try {
                    const jsonStr = analysisText.replace(/```json|```/g, '').trim();
                    currentAnalysis = JSON.parse(jsonStr);
                } catch (parseErr) {
                    throw new Error("Failed to parse Gemini response. Trying to extract JSON manually...");
                }

                const validation = validateAnalysis(currentAnalysis);
                if (!validation.valid) {
                    const fallback = extractJsonFromText(analysisText);
                    if (fallback) {
                        currentAnalysis = fallback;
                        const revalidate = validateAnalysis(currentAnalysis);
                        if (!revalidate.valid) throw new Error(revalidate.error);
                    } else {
                        throw new Error(validation.error);
                    }
                }

// STEP 3: Show Result
                renderResult(currentAnalysis);
                showToast('Sentence Analyzed!', 'bg-blue-600');

            } catch (err) {
                console.error(err);
                showToast(err.message, 'bg-rose-500');
            } finally {
                btn.disabled = false; text.classList.remove('hidden'); spinner.classList.add('hidden');
            }
        }

function renderResult(d) {
            document.getElementById('analysisContent').innerHTML = `
                <div><div class="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1 text-center">Translation</div><div class="text-base font-bold text-center italic">"${escapeHtml(d.translation)}"</div></div>
                <div><div class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-2 border-b pb-1">Vocabulary</div><ul class="space-y-2">${d.breakdown.map(i => `<li><span class="text-blue-600 font-bold">${escapeHtml(i.word)}</span> <span class="text-slate-300 mx-1">→</span> ${escapeHtml(i.meaning)}</li>`).join('')}</ul></div>
                ${d.grammar?.length ? `<div><div class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-2 border-b pb-1">Grammar</div><ul class="space-y-2">${d.grammar.map(g => `<li><span class="font-bold text-slate-700">${escapeHtml(g.point)}</span>: ${escapeHtml(g.explanation)}</li>`).join('')}</ul></div>` : ''}
            `;
            document.getElementById('resultCard').classList.remove('hidden');
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth' });
        }

async function addToAnki() {
            if (!currentAnalysis) return;
            
            const front = currentAnalysis.sentence;
            let back = `<b>${currentAnalysis.translation}</b>\n\n`;
            back += `<b>Vocabulary</b>\n`;
            currentAnalysis.breakdown.forEach(i => back += `• ${i.word} — ${i.meaning}\n`);
            if (currentAnalysis.grammar?.length) {
                back += `\n<b>Grammar</b>\n`;
                currentAnalysis.grammar.forEach(g => back += `• ${g.point}: ${g.explanation}\n`);
            }
            if (currentAnalysis.slang_or_culture) {
                back += `\n<b>Notes</b>\n${currentAnalysis.slang_or_culture}`;
            }

            if (!navigator.share) {
                showToast('Web Share not supported. Use AnkiDroid share feature.', 'bg-rose-500');
                return;
            }

            try {
                await navigator.share({
                    title: front,
                    text: `${back}`
                });
                showToast('Opening AnkiDroid...', 'bg-blue-600');
            } catch (e) {
                if (e.name !== 'AbortError') {
                    showToast('Share cancelled', 'bg-rose-500');
                }
                return;
            }

            setTimeout(() => {
                clearResult();
                showToast('Card added!', 'bg-green-600');
            }, 1500);
        }

        function clearResult() {
            document.getElementById('resultCard').classList.add('hidden'); 
            document.getElementById('sentenceInput').value = ''; 
            currentAnalysis = null;
        }
    </script>
</body>
</html>
